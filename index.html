<!DOCTYPE html>
<html>
<head>
    <title>Chat Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            width: 340px;
        }

        h2 {
            margin-bottom: 15px;
            color: #2E7D32;
        }

        .input-group {
            display: flex;
            margin-bottom: 10px;
        }

        .code {
            padding: 10px;
            background: #eee;
            border: 1px solid #ccc;
            border-right: none;
            border-radius: 6px 0 0 6px;
            font-weight: bold;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            outline: none;
            width: 100%;
        }

        input {
            border-radius: 0 6px 6px 0;
        }

        textarea {
            border-radius: 6px;
            margin-bottom: 10px;
            resize: none;
            height: 60px;
        }

        button {
            padding: 10px 20px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #43a047;
        }

        .note {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }

        .about {
            font-size: 12px;
            color: #555;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Chat Demo</h2>

    <div class="input-group">
        <div class="code">+91</div>
        <input type="text" id="number" placeholder="Enter mobile number">
    </div>

    <textarea id="message" placeholder="Type your message (optional)"></textarea>

    <button onclick="openChat()">Start Chat</button>

    <p class="note">We do not store or share your data.</p>

    <div class="about">
        <p>This is a simple demo tool to open chat links without saving numbers.</p>
        <p>This site is not affiliated with any messaging platform.</p>
    </div>
</div>

<script>
function openChat() {
    var number = document.getElementById("number").value.trim();
    var message = document.getElementById("message").value.trim();

    if (!number) {
        alert("Please enter a mobile number");
        return;
    }

    number = number.replace(/[^0-9]/g, '');

    if (number.length !== 10) {
        alert("Enter a valid 10-digit number");
        return;
    }

    var fullNumber = "91" + number;

    var url = "https://wa.me/" + fullNumber;

    if (message) {
        url += "?text=" + encodeURIComponent(message);
    }

    if (confirm("Do you want to continue to chat?")) {
        window.open(url, "_blank");
    }
}
</script>

</body>
</html>
